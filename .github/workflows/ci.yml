name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install CodeMOP first as it is a dependency for the others
          pip install -e CodeMOP/
          # Install other dependencies
          if [ -f CodeMAID/requirements.txt ]; then pip install -r CodeMAID/requirements.txt; fi
          pip install pytest pytest-cov httpx blessed pyyaml watchdog

      - name: Run tests
        run: |
          # Set pythonpath so tests can find the packages
          export PYTHONPATH=$PYTHONPATH:$(pwd)/CodeMOP:$(pwd)/CodeMAID:$(pwd)/CodeCREW
          pytest tests/ -v --tb=short
